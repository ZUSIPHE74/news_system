{% extends 'news_app/base.html' %}
{% block title %}Create Publisher - NewsApp{% endblock %}
{% block content %}

<div style="max-width: 600px; margin: 40px auto;">
    <div class="page-header fade-in">
        <h1>Create Publisher</h1>
        <p>Register a new media organization to the platform.</p>
    </div>

    <div class="form-card fade-in">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}

            <div style="display: flex; gap: 12px; justify-content: flex-end; padding-top: 8px;">
                <a href="{% url 'home' %}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Publisher</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
