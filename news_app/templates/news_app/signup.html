{% extends 'news_app/base.html' %}
{% block title %}Sign Up – NewsApp{% endblock %}
{% block content %}

<div style="max-width:420px; margin:40px auto;">
    <div class="card">
        <div style="text-align:center; margin-bottom:28px;">
            <div style="font-size:2.5rem; margin-bottom:12px; color: var(--blue-light);"><i class="fa-solid fa-user-plus"></i></div>
            <h1 style="font-size:1.5rem; font-weight:800;">Create an Account</h1>
            <p style="color:var(--text-dim); font-size:0.875rem; margin-top:4px;">Join NewsApp today</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
            </div>
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" required>
                    <option value="reader">Reader</option>
                    <option value="journalist">Journalist</option>
                    <option value="editor">Editor</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px; font-size:1rem;">
                Sign Up
            </button>
        </form>
        <div style="text-align:center; margin-top:20px; font-size:0.875rem; color:var(--text-dim);">
            Already have an account?
            <a href="{% url 'login' %}" style="color:var(--blue-light); font-weight:600; text-decoration:none;">Log In</a>
        </div>
    </div>
</div>

{% endblock %}
