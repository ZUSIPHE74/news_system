{% extends 'news_app/base.html' %}
{% block title %}Edit Publisher – NewsApp{% endblock %}
{% block content %}

<div style="max-width:520px; margin:0 auto;">
    <div class="card">
        <h1 style="font-size:1.5rem; font-weight:800; margin-bottom:6px;">Edit Publisher</h1>
        <p style="color:var(--text-dim); font-size:0.875rem; margin-bottom:28px;">Update organization details.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Publisher Name</label>
                <input type="text" id="name" name="name" value="{{ publisher.name }}" required>
            </div>

            <div class="form-group">
                <label for="website">Website URL</label>
                <input type="text" id="website" name="website" value="{{ publisher.website|default:'' }}" placeholder="https://example.com">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="5" placeholder="Describe the publishing house...">{{ publisher.description }}</textarea>
            </div>

            <div class="form-group" style="display:flex; align-items:center; gap:12px; margin-top:24px;">
                <input type="checkbox" id="is_verified" name="is_verified" style="width:20px; height:20px;" {% if publisher.is_verified %}checked{% endif %}>
                <label for="is_verified" style="margin:0;">Mark as Verified Organization</label>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px; margin-top:24px;">
                Save Changes
            </button>
        </form>

        <div style="margin-top:16px; text-align:center;">
            <a href="{% url 'publisher_profile' publisher.pk %}" class="btn btn-ghost btn-sm">Cancel & Return to Profile</a>
        </div>
    </div>
</div>

{% endblock %}
