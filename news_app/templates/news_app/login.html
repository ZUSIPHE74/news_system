{% extends 'news_app/base.html' %}
{% block title %}Log In – NewsApp{% endblock %}
{% block content %}

<div style="max-width:400px; margin:40px auto;">
    <div class="card">
        <div style="text-align:center; margin-bottom:28px;">
            <div style="font-size:2.5rem; margin-bottom:12px; color: var(--blue-light);"><i class="fa-solid fa-user-lock"></i></div>
            <h1 style="font-size:1.5rem; font-weight:800;">Welcome back</h1>
            <p style="color:var(--text-dim); font-size:0.875rem; margin-top:4px;">Sign in to your NewsApp account</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px; font-size:1rem;">
                Log In
            </button>
        </form>
        <div style="text-align:center; margin-top:20px; font-size:0.875rem; color:var(--text-dim);">
            Don't have an account?
            <a href="{% url 'signup' %}" style="color:var(--blue-light); font-weight:600; text-decoration:none;">Sign Up</a>
        </div>
    </div>
</div>

{% endblock %}
